<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og.title" content="React quize by Fazle Hasan" />
    <meta property="og.description" content="React quize by Fazle Hasan" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/quiz.css" />
    <title>Home - Fazle Hasan</title>
  </head>
  <body>
    <!-- Navbar start Hear -->
    <nav class="nav">
      <ul>
        <li>
          <a href="index.html" class="brand">
            <img src="./images/logo-bg.png" alt="Fazle Hasan Logo" />
            <h3>Fazle Hasan</h3>
          </a>
        </li>
      </ul>
      <div class="account">
        <span class="material-incons-outlined"> account_circle </span>
        <a href="signup.html">Signup</a>
      </div>
    </nav>
    <!-- Navbar end Hear -->

    <main class="main">
        <div class="container">
            <!-- Login Account start Hear  -->
        <h1> Login to your account </h1>
        <div class="column">
            <div class="illustration">
            <img src="./images/login.svg" alt="Login">
        </div><!-- Login Account end Hear  -->
        <form class="login form" action="#">
            <!-- Enter email start here  -->
            <div class="textInput">
                <input type="text" placeholder="Enter email">
                <span class="material_icons-outlined">alternate_email</span>
            </div><!-- Enter email end here  -->

            <!-- Enter Password start here  -->
            <div class="textInput">
                <input type="password" placeholder="Enter Password">
                <span class="material-icons-outlined"> lock </span>
            </div>
            <!-- Enter Password end here  -->
            <!-- Button start here  -->
            <button class="button">
                <span>Submit Now</span>
            </button>
            <!-- Button end here  -->
            <!-- Signup start here  -->
            <div class="info">Don't have an account?
                 <a href="signup.html">Signup</a> instead.</div>
            <!-- Signup end here  -->
        
            <script src="./scripts/script.js"></script>    
        </form>

    </main>
    
  </body>
</html>

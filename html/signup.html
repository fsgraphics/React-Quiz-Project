  <body>
    <!-- Navbar start Hear -->
    <nav class="nav">
      <ul>
        <li>
          <a href="index.html" class="brand">
            <img src="./images/logo-bg.png" alt="Fazle Hasan Logo" />

      <div class="account">

    <!-- Navbar end Hear -->

    <main class="main">
      <div class="container">
        <h1>Create an account</h1>
        <div class="column">
          <div class="illustration">
            <img src="./images/signup.svg" alt="signup" />
          </div>
          <form action="#" class="signup form">
            <!-- Person section -->
            <div class="textInput">
              <input type="text" placeholder="Enter name" />
              <span class="material-incons-outlined">Person</span>
            </div>
            <!-- Alternate_email section -->
            <div class="textInput">
              <input type="text" placeholder="Enter name" />
              <span class="material-incons-outlined">Alternate_email </span>
            </div>
            <!-- password section -->
            <div class="textInput">
              <input type="password" placeholder="Enter password" />
              <span class="material-incons-outlined">lock </span>
            </div>
            <!-- Confirm password section -->
            <div class="textInput">
              <input type="password" placeholder="Confirm password" />
              <span class="material-incons-outlined">lock_clock </span>
            </div>
            <!-- checkbox section -->
            <label for="#"
              ><input type="checkbox" />
              <span> I agree to the terms & Conditions</span></label
            >
            checkbo
            <!-- Button section -->
            <button class="button">
              <span>Submit Now</span>
            </button>
          </form>
        </div>
      </div>
